name: Build Aster

# Builds the disguised offline POS into a Windows installer.
# Distribution is manual (installer given only to paying customers), so we
# upload the artifact (and attach it to a GitHub Release on version tags).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build (renderer + main)
        run: npm run build
      - name: Package Windows installer
        run: npx electron-builder --win --publish never
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aster-windows-installer
          path: release/*.exe
          if-no-files-found: error
      - name: Attach installer to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
